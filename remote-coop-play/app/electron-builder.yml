appId: com.ensamprompters.remotecoopplay
productName: Remote Coop Play
directories:
  output: dist
files:
  - src/**/*
  - assets/**/*
  - package.json
asar: true
asarUnpack:
  - src/native/**
win:
  target:
    - portable
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
